# Desarrollo local: backend Java + PostgreSQL.
# Desde la carpeta backend/:  docker compose up --build
#
# Puertos en el host:
#   8080  -> API HTTP del backend
#   15432 -> PostgreSQL (útil si conectás una herramienta o el mismo backend fuera de Docker)
#
# Dentro de la red de Compose, el backend usa el host JDBC "postgres" y el puerto interno 5432.

services:
  postgres:
    image: postgres:16-alpine
    container_name: agromonitor-postgres
    environment:
      POSTGRES_USER: agro
      POSTGRES_PASSWORD: agro
      POSTGRES_DB: agromonitor
    ports:
      - "15432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agro -d agromonitor"]
      interval: 3s
      timeout: 5s
      retries: 20

  backend:
    build: .
    container_name: agromonitor-backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      JDBC_URL: jdbc:postgresql://postgres:5432/agromonitor
      DB_USER: agro
      DB_PASSWORD: agro
    depends_on:
      postgres:
        condition: service_healthy
